name: CI

on:
  push:
    branches-ignore:
      - main
  workflow_call:

permissions:
  contents: read

jobs:
  github-actions-lint:
    name: GitHub Actions Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    env:
      GHALINT_VERSION: v1.5.6

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.4"
          cache: false

      - name: Install ghalint
        run: go install "github.com/suzuki-shunsuke/ghalint/cmd/ghalint@${GHALINT_VERSION}"

      - name: Run actionlint
        id: actionlint
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

      - name: Run zizmor
        if: ${{ !cancelled() }}
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false
          version: 1.25.2

      - name: Run ghalint
        if: ${{ !cancelled() }}
        run: ghalint run
        env:
          GHALINT_LOG_COLOR: always
          GITHUB_TOKEN: ${{ github.token }}

  frontend-format:
    name: Frontend Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Check frontend formatting
        run: pnpm format:check

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm lint

  frontend-check:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check frontend
        run: pnpm check

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend assets
        run: pnpm build:frontend

  rust-format:
    name: Rust Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Rust
        id: rust-toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt

      - name: Fetch Cargo dependencies
        run: cargo fetch

      - name: Check Rust formatting
        run: cargo fmt --check

  toml-format:
    name: TOML Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Resolve taplo-cli version
        id: taplo-version
        run: |
          VER=$(cargo metadata --no-deps --format-version 1 | jq -er '.packages[0].metadata["cargo-binaries"]["taplo-cli"]')
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "taplo-cli ${VER}"

      - name: Cache taplo
        id: cache-taplo
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/bin/taplo
          key: ${{ runner.os }}-taplo-${{ steps.taplo-version.outputs.version }}

      - name: Install taplo
        if: steps.cache-taplo.outputs.cache-hit != 'true'
        run: cargo install taplo-cli --version "$TAPLO_CLI_VERSION" --locked
        env:
          TAPLO_CLI_VERSION: ${{ steps.taplo-version.outputs.version }}

      - name: Check TOML formatting
        run: taplo fmt --check

  rust-lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Rust
        id: rust-toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ github.ref_name != github.event.repository.default_branch && format('{0}-cargo-', runner.os) || '' }}

      - name: Fetch Cargo dependencies
        run: cargo fetch

      - name: Cache Rust target
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: target
          key: ${{ runner.os }}-${{ github.job }}-target-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ github.ref_name != github.event.repository.default_branch && format('{0}-{1}-target-{2}-', runner.os, github.job, steps.rust-toolchain.outputs.cachekey) || '' }}

      - name: Lint Rust
        run: cargo clippy --all-targets --tests -- -D warnings

  rust-test:
    name: Rust Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Rust
        id: rust-toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Cargo dependencies
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ github.ref_name != github.event.repository.default_branch && format('{0}-cargo-', runner.os) || '' }}

      - name: Fetch Cargo dependencies
        run: cargo fetch

      - name: Cache Rust target
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: target
          key: ${{ runner.os }}-${{ github.job }}-target-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ github.ref_name != github.event.repository.default_branch && format('{0}-{1}-target-{2}-', runner.os, github.job, steps.rust-toolchain.outputs.cachekey) || '' }}

      - name: Test Rust
        run: cargo test
        env:
          PROPTEST_CASES: 4096

  worker-build:
    name: Worker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Rust
        id: rust-toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo dependencies
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ github.ref_name != github.event.repository.default_branch && format('{0}-cargo-', runner.os) || '' }}

      - name: Fetch Cargo dependencies
        run: cargo fetch

      - name: Cache Rust target
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: target
          key: ${{ runner.os }}-production-target-${{ steps.rust-toolchain.outputs.cachekey }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ github.ref_name != github.event.repository.default_branch && format('{0}-production-target-{1}-', runner.os, steps.rust-toolchain.outputs.cachekey) || '' }}

      - name: Build Rust for Workers target
        run: cargo build --target wasm32-unknown-unknown

      - name: Resolve worker-build version
        id: worker-build-version
        run: |
          VER=$(cargo metadata --no-deps --format-version 1 | jq -er '.packages[0].metadata["cargo-binaries"]["worker-build"]')
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "worker-build ${VER}"

      - name: Cache worker-build
        id: cache-worker-build
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/bin/worker-build
          key: ${{ runner.os }}-worker-build-${{ steps.worker-build-version.outputs.version }}

      - name: Install worker-build
        if: steps.cache-worker-build.outputs.cache-hit != 'true'
        run: cargo install worker-build --version "$WORKER_BUILD_VERSION" --locked
        env:
          WORKER_BUILD_VERSION: ${{ steps.worker-build-version.outputs.version }}

      - name: Build Worker
        run: worker-build --release

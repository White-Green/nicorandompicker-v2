compatibility_date = "2026-04-17"
main = "build/worker/shim.mjs"
name = "nicorandompicker"

[build]
command = "worker-build --release"

[assets]
binding = "ASSETS"
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[observability.logs]
enabled = true
invocation_logs = true

[[ratelimits]]
name = "AUTHENTICATED_API_RATE_LIMITER"
namespace_id = "1001"

[ratelimits.simple]
limit = 5
period = 10

[[ratelimits]]
name = "ANONYMOUS_API_RATE_LIMITER"
namespace_id = "1002"

[ratelimits.simple]
limit = 2
period = 60

[[ratelimits]]
name = "TURNSTILE_VERIFY_BURST_RATE_LIMITER"
namespace_id = "1003"

[ratelimits.simple]
limit = 3
period = 10

[[ratelimits]]
name = "TURNSTILE_VERIFY_CLIENT_RATE_LIMITER"
namespace_id = "1004"

[ratelimits.simple]
limit = 10
period = 60
